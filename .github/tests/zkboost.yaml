participants:
  - cl_type: lighthouse
    cl_image: ethpandaops/lighthouse:eth-act-optional-proofs
    el_type: reth
    supernode: true
    cl_extra_params:
      - --target-peers=3
      - --proof-engine-endpoint=http://zkboost:3000
      - --proof-types=6
    vc_extra_params:
      - --proof-engine-endpoint=http://zkboost:3000
      - --proof-types=6
    count: 2
  - cl_type: lighthouse
    cl_image: ethpandaops/lighthouse:eth-act-optional-proofs
    el_type: reth
    supernode: false
    cl_extra_params:
      - --target-peers=3
      - --proof-engine-endpoint=http://zkboost:3000
      - --proof-types=6
    count: 2

additional_services:
  - zkboost
  - dora
  - prometheus
  - grafana
  - tempo

zkboost_params:
  image: ghcr.io/eth-act/zkboost/zkboost:0.5.0
  env:
    RUST_LOG: info,zkboost=debug
  zkvms:
    - kind: mock
      proof_type: reth-zisk
      mock_proving_time: { kind: random, min_ms: 2000, max_ms: 8000 }
      mock_proof_size: 1024
