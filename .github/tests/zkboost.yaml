participants:
  - count: 2
    el_type: reth
    cl_type: lighthouse

additional_services:
  - zkboost
  - dora
  - prometheus
  - grafana

zkboost_params:
  dashboard_enabled: true
  zkvms:
    - kind: mock
      proof_type: reth-zisk
      mock_proving_time: { kind: constant, ms: 5000 }
      mock_proof_size: 1024
    - kind: mock
      proof_type: ethrex-zisk
      mock_proving_time: { kind: random, min_ms: 2000, max_ms: 8000 }
