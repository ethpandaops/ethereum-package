# Test: Should fail with "ere requires GPU" error
# Expected error: proof_type 'reth-zisk' has kind=ere but no GPU configured
participants:
  - count: 1
    el_type: reth
    cl_type: lighthouse
    cl_image: ethpandaops/lighthouse:eth-act-optional-proofs
    cl_extra_params:
      - --proof-engine-endpoint=http://zkboost:3000
      - --proof-types=6

additional_services:
  - zkboost

zkboost_params:
  zkvms:
    - kind: ere
      proof_type: reth-zisk
      # No GPU configured - should fail
