# Test: Should fail with "missing zkvm for requested proof_type" error
# Expected error: Participant requests proof_type 'ethrex-zisk' via --proof-types flag,
#                 but no zkvm is configured for it
participants:
  - count: 1
    el_type: reth
    cl_type: lighthouse
    cl_image: ethpandaops/lighthouse:eth-act-optional-proofs
    cl_extra_params:
      - --proof-engine-endpoint=http://zkboost:3000
      - --proof-types=2,6  # Requests ethrex-zisk (2) and reth-zisk (6)

additional_services:
  - zkboost

zkboost_params:
  zkvms:
    - kind: mock
      proof_type: reth-zisk  # Only reth-zisk configured, ethrex-zisk missing - should fail
