name: CI

on:
  pull_request:

concurrency:
  group: "tests-${{ github.head_ref }}"
  cancel-in-progress: true

jobs:
  run_with_args:
    strategy:
      matrix:
        file_name:
          [
            "./.github/tests/mev.yaml",
            "./.github/tests/mev-mock.yaml",
            "./.github/tests/mix-with-tools.yaml",
            "./.github/tests/mix-persistence.yaml",
            "./.github/tests/mix-public.yaml",
            "./.github/tests/minimal.yaml",
            "./network_params.yaml",
            "."
          ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/docker-login
        with:
          username: ethpandaops
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Setup Kurtosis
        uses: ./.github/actions/kurtosis-install
      - name: Run Starlark
        run: |
          if [[ "${{ matrix.file_name }}" == "." ]]; then
            echo "ENCLAVE=default" >> "$GITHUB_ENV"
            kurtosis run ${{ github.workspace }} --enclave "default" --verbosity detailed --image-download always
          else
            enclave=$(basename "${{ matrix.file_name }}" .yaml | tr '_.' '--')
            echo "ENCLAVE=$enclave" >> "$GITHUB_ENV"
            kurtosis run ${{ github.workspace }} --enclave "$enclave" --args-file ${{ matrix.file_name }} --verbosity detailed --image-download always
          fi
      - name: Upload genesis config
        if: matrix.file_name == '.' || matrix.file_name == './network_params.yaml' || matrix.file_name == './.github/tests/minimal.yaml'
        run: kurtosis files download "$ENCLAVE" el_cl_genesis_data /tmp/genesis-$ENCLAVE
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: matrix.file_name == '.' || matrix.file_name == './network_params.yaml' || matrix.file_name == './.github/tests/minimal.yaml'
        with:
          name: genesis-config-${{ env.ENCLAVE }}
          path: /tmp/genesis-${{ env.ENCLAVE }}/config.yaml
          retention-days: 1

  check-consensus-spec-values:
    name: Check consensus spec values (${{ matrix.label }})
    needs: run_with_args
    continue-on-error: true
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: default
            artifact: genesis-config-default
            preset: mainnet
          - label: network-params
            artifact: genesis-config-network-params
            preset: mainnet
          - label: minimal
            artifact: genesis-config-minimal
            preset: minimal
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ matrix.artifact }}
          path: /tmp/genesis
      - name: Install pyyaml
        run: pip install pyyaml --quiet
      - name: Download upstream consensus-specs config
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/ethereum/consensus-specs/master/configs/${{ matrix.preset }}.yaml" \
            -o /tmp/spec.yaml
      - name: Compare genesis config.yaml against upstream spec
        run: |
          python3 .github/check-consensus-spec-values.py \
            --our-config /tmp/genesis/config.yaml \
            --spec-config /tmp/spec.yaml

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Kurtosis
        uses: ./.github/actions/kurtosis-install
      - name: Kurtosis Lint
        run: kurtosis lint ${{ github.workspace }}

  assertoor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/docker-login
        with:
          username: ethpandaops
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Kurtosis Assertoor GitHub Action
        uses: ethpandaops/kurtosis-assertoor-github-action@f64942cbc780df731a731ea9f45765b161d2c8df # v1
        with:
          ethereum_package_url: "."
          ethereum_package_branch: ""
          ethereum_package_args: .github/tests/mix-assert.yaml


  speed_benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: ./.github/actions/docker-login
        with:
          username: ethpandaops
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Setup Kurtosis
        uses: ./.github/actions/kurtosis-install
      - name: Pre-pull Docker images
        run: |
          # Pre-pull images in parallel so kurtosis finds them cached (with --image-download missing)
          docker pull ethereum/client-go:latest &
          docker pull ethpandaops/lighthouse:unstable &
          docker pull ethpandaops/ethereum-genesis-generator:5.2.4 &
          docker pull protolambda/eth2-val-tools:latest &
          wait
      - name: Run Speed Benchmark
        run: |
          set -euo pipefail

          echo "=== Speed Benchmark ==="
          echo "Start time: $(date -u +%Y-%m-%dT%H:%M:%S%Z)"
          START_TIME=$(date +%s)

          kurtosis run ${{ github.workspace }} \
            --args-file .github/tests/speed.yaml \
            --verbosity detailed \
            --image-download missing 2>&1 | tee /tmp/speed-benchmark-output.log

          END_TIME=$(date +%s)
          TOTAL_DURATION=$((END_TIME - START_TIME))

          echo ""
          echo "========================================="
          echo "=== SPEED BENCHMARK RESULTS ==="
          echo "========================================="
          echo "Total wall-clock time: ${TOTAL_DURATION}s"
          echo "Target: 60s"
          echo ""
          echo "=== Phase Timing Markers ==="
          grep "TIMING:" /tmp/speed-benchmark-output.log || echo "No timing markers found"
          echo ""
          if [ "$TOTAL_DURATION" -le 60 ]; then
            echo "PASS: Network created within 60s target"
          else
            echo "OVER TARGET: ${TOTAL_DURATION}s exceeds 60s target by $((TOTAL_DURATION - 60))s"
          fi
          echo "========================================="

  speed_benchmark_3x3:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: ./.github/actions/docker-login
        with:
          username: ethpandaops
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Setup Kurtosis
        uses: ./.github/actions/kurtosis-install
      - name: Pre-pull Docker images
        run: |
          # Pre-pull images in parallel so kurtosis finds them cached (with --image-download missing)
          docker pull ethereum/client-go:latest &
          docker pull ghcr.io/paradigmxyz/reth &
          docker pull nethermind/nethermind:latest &
          docker pull ethpandaops/lighthouse:unstable &
          docker pull ethpandaops/teku:master &
          docker pull ethpandaops/nimbus-eth2:unstable-minimal &
          docker pull ethpandaops/ethereum-genesis-generator:5.2.4 &
          docker pull protolambda/eth2-val-tools:latest &
          wait
      - name: Run Speed Benchmark 3x3
        run: |
          set -euo pipefail

          echo "=== Speed Benchmark 3x3 (9 participants) ==="
          echo "Start time: $(date -u +%Y-%m-%dT%H:%M:%S%Z)"
          START_TIME=$(date +%s)

          kurtosis run ${{ github.workspace }} \
            --args-file .github/tests/speed-3x3.yaml \
            --verbosity detailed \
            --image-download missing 2>&1 | tee /tmp/speed-benchmark-3x3-output.log

          END_TIME=$(date +%s)
          TOTAL_DURATION=$((END_TIME - START_TIME))

          echo ""
          echo "========================================="
          echo "=== SPEED BENCHMARK 3x3 RESULTS ==="
          echo "========================================="
          echo "Total wall-clock time: ${TOTAL_DURATION}s"
          echo "Target: 120s"
          echo ""
          echo "=== Phase Timing Markers ==="
          grep "TIMING:" /tmp/speed-benchmark-3x3-output.log || echo "No timing markers found"
          echo ""
          if [ "$TOTAL_DURATION" -le 120 ]; then
            echo "PASS: Network created within 120s target"
          else
            echo "OVER TARGET: ${TOTAL_DURATION}s exceeds 120s target by $((TOTAL_DURATION - 120))s"
          fi
          echo "========================================="

