name: CI

on:
  pull_request:

concurrency:
  group: "tests-${{ github.head_ref }}"
  cancel-in-progress: true

jobs:
  run_starlark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/docker-login
        with:
          username: ethpandaops
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Setup Kurtosis
        uses: ./.github/actions/kurtosis-install
      - name: Run Starlark
        run: |
          kurtosis run ${{ github.workspace }} --args-file network_params.yaml --verbosity detailed --image-download always

  run_with_args:
    strategy:
      matrix:
        file_name:
          [
            "./.github/tests/mev.yaml",
            "./.github/tests/mev-mock.yaml",
            "./.github/tests/mix-with-tools.yaml",
            "./.github/tests/mix-persistence.yaml",
            "./.github/tests/mix-public.yaml",
            "./.github/tests/minimal.yaml",
            "./network_params.yaml"
          ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/docker-login
        with:
          username: ethpandaops
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Setup Kurtosis
        uses: ./.github/actions/kurtosis-install
      - name: Run Starlark
        run: |
          kurtosis run ${{ github.workspace }} --args-file ${{ matrix.file_name }} --verbosity detailed --image-download always

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Kurtosis
        uses: ./.github/actions/kurtosis-install
      - name: Kurtosis Lint
        run: kurtosis lint ${{ github.workspace }}

  assertoor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/docker-login
        with:
          username: ethpandaops
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Kurtosis Assertoor GitHub Action
        uses: ethpandaops/kurtosis-assertoor-github-action@5932604b244dbd2ddb811516b516a9094f4d2c2f # v1
        with:
          ethereum_package_url: "."
          ethereum_package_branch: ""
          ethereum_package_args: .github/tests/mix-assert.yaml


  speed_benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: ./.github/actions/docker-login
        with:
          username: ethpandaops
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Setup Kurtosis
        uses: ./.github/actions/kurtosis-install
      - name: Run Speed Benchmark
        run: |
          set -euo pipefail

          echo "=== Speed Benchmark ==="
          echo "Start time: $(date -u +%Y-%m-%dT%H:%M:%S%Z)"
          START_TIME=$(date +%s)

          kurtosis run ${{ github.workspace }} \
            --args-file .github/tests/speed.yaml \
            --verbosity detailed \
            --image-download always 2>&1 | tee /tmp/speed-benchmark-output.log

          END_TIME=$(date +%s)
          TOTAL_DURATION=$((END_TIME - START_TIME))

          echo ""
          echo "========================================="
          echo "=== SPEED BENCHMARK RESULTS ==="
          echo "========================================="
          echo "Total wall-clock time: ${TOTAL_DURATION}s"
          echo "Target: 60s"
          echo ""
          echo "=== Phase Timing Markers ==="
          grep "TIMING:" /tmp/speed-benchmark-output.log || echo "No timing markers found"
          echo ""
          if [ "$TOTAL_DURATION" -le 60 ]; then
            echo "PASS: Network created within 60s target"
          else
            echo "OVER TARGET: ${TOTAL_DURATION}s exceeds 60s target by $((TOTAL_DURATION - 60))s"
          fi
          echo "========================================="

